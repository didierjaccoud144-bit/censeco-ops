<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>CENSECO PDG 2026 - V10.2 CLOUD</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --bg: #f1f5f9; --fids: #ffcc00; --accent: #4338ca; --success: #15803d; --danger: #dc2626; --wa: #128c7e; --sas: #f97316; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #000; color: #fff; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--fids); z-index: 1001; }
        .nav-main { display: flex; background: #fff; border-bottom: 1px solid #cbd5e1; flex-shrink: 0; }
        .nav-btn { padding: 15px 20px; cursor: pointer; border: none; background: none; font-weight: bold; opacity: 0.5; font-size: 0.85em; }
        .nav-btn.active { opacity: 1; border-bottom: 3px solid var(--accent); color: var(--accent); }
        .container { flex: 1; overflow-y: auto; padding: 20px; position: relative; }
        .page { display: none; } .page.active { display: block; }
        .card { background: #e2e8f0; padding: 18px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 20px; }
        .row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 10px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 0.65em; font-weight: 900; color: #475569; text-transform: uppercase; }
        input, select, textarea { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: 800; background: #fff; }
        .t-table { width: 100%; border-collapse: separate; border-spacing: 0 5px; table-layout: fixed; }
        .t-table th { font-size: 0.7em; text-transform: uppercase; color: #64748b; padding: 10px; text-align: left; }
        .t-row td { background: #fff; padding: 12px; border-top: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1; vertical-align: middle; }
        .col-prio { width: 45px; text-align: center; font-weight: 900; border-left: 8px solid transparent; border-radius: 6px 0 0 6px; }
        .prio-0 { border-left-color: #000 !important; } .prio-1 { border-left-color: var(--danger) !important; }
        .row-p0 td { background-color: #ffff00 !important; color: #000 !important; border-top: 2px solid #000 !important; border-bottom: 2px solid #000 !important; }
        .row-p1 td { animation: pulse-p1 1.5s infinite; }
        @keyframes pulse-p1 { 0%, 100% { background-color: #fff; } 50% { background-color: rgba(220, 38, 38, 0.15); } }
        .date-sep { background: var(--accent); color: #fff; padding: 12px; border-radius: 8px; margin-top: 15px; font-weight: 800; cursor: pointer; display: flex; justify-content: space-between; }
        .has-p1-alert { animation: pulse-red-bandeau 1.5s infinite !important; }
        @keyframes pulse-red-bandeau { 0%, 100% { background-color: var(--accent); } 50% { background-color: var(--danger); } }
        .vis-container { background: #0f172a !important; border-radius: 10px; border: 2px solid #334155; height: 600px; }
        .vis-label { color: var(--fids) !important; font-weight: bold; background: #1e293b !important; }
        .vis-time-axis .vis-text { color: var(--fids) !important; font-weight: bold; }
        .vis-item { border-radius: 4px !important; border-width: 0 0 0 6px !important; font-weight: bold; }
        .tl-p0 { background: #ffff00 !important; color: #000 !important; border-color: #000 !important; }
        .tl-p1 { background: #dc2626 !important; color: #fff !important; border-color: #7f1d1d !important; }
        .tl-p2 { background: #4338ca !important; color: #fff !important; border-color: #1e1b4b !important; }
        .btn-v { background: var(--success); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .btn-i { height: 32px; min-width: 40px; border-radius: 6px; border: none; color: #fff; font-weight: 900; cursor: pointer; margin-left: 4px; display: inline-flex; align-items: center; justify-content: center; }
        .floating-nav { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .btn-float { background: #1e293b; color: var(--fids); border: 2px solid #fff; padding: 10px 18px; border-radius: 30px; font-weight: 900; cursor: pointer; font-size: 0.75em; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900;">CENSECO 2026 - MISSIONS PDG (CLOUD)</div>
    <div id="clock" style="font-family: monospace; color: var(--fids); font-size: 1.2em;">00:00:00</div>
</header>

<div class="nav-main">
    <button class="nav-btn active" onclick="showPage('ops', event)">📋 OPERATIONS</button>
    <button class="nav-btn" onclick="showPage('timeline-ops', event)">🗓️ TIMELINE MISSIONS</button>
    <button class="nav-btn" onclick="showPage('retex', event)">📦 RETEX</button>
</div>

<div class="container">
    <div id="ops" class="page active">
        <div class="card">
            <input type="hidden" id="editTaskId">
            <div class="row">
                <div id="nextPdgId" style="background:#000;color:var(--fids);padding:8px;border-radius:6px;font-family:monospace;font-weight:bold;border:1px solid var(--fids);">PDG-00001</div>
                <div class="field" style="flex:1;"><label>Titre Mission</label><input type="text" id="tTitle"></div>
                <div class="field"><label>Responsable</label><select id="tResp"></select></div>
                <div id="sectorGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;background:#fff;padding:8px;border-radius:8px;border:1px solid #cbd5e1;"></div>
            </div>
            <div class="row">
                <div class="field"><label>Lieu</label><input type="text" id="tLoc" style="width:180px;"></div>
                <div class="field"><label>Début</label><input type="datetime-local" id="tStart"></div>
                <div class="field"><label>Fin</label><input type="datetime-local" id="tEnd"></div>
                <div class="field"><label>Prio</label>
                    <select id="tPrio"><option value="0">🚨 P0</option><option value="1">P1</option><option value="2" selected>P2</option><option value="3">P3</option></select>
                </div>
                <div class="field"><label>TL</label><input type="checkbox" id="tTL" checked></div>
                <div class="field"><label>CPF</label><input type="checkbox" id="tCPF"></div>
                <input type="text" id="tNote" placeholder="Notes / Observations" style="flex:1">
                <button class="btn-v" onclick="addMission()">VALIDER MISSION</button>
            </div>
        </div>
        <div id="p0Container"></div>
        <div id="opsList"></div>
    </div>

    <div id="timeline-ops" class="page">
        <div id="vis-ops" class="vis-container"></div>
        <div class="floating-nav">
            <button class="btn-float" style="background:var(--danger);color:#fff;display:none;" id="jump-next-mission" onclick="focusNextMission()">Prochaine mission ➔</button>
            <button class="btn-float" onclick="resetViewOps()">🎯 Vue Standard</button>
        </div>
    </div>

    <div id="retex" class="page">
        <h2 style="color:var(--sas); border-bottom:2px solid var(--sas); padding-bottom:10px;">📥 SAS DE CLÔTURE</h2>
        <div id="sasList"></div>
        <h2 style="color:var(--accent); border-bottom:2px solid var(--accent); margin-top:40px; padding-bottom:10px;">🗄️ ARCHIVES</h2>
        <div id="archiveList"></div>
    </div>
</div>

<div id="infoModal" onclick="closeModal()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:5000; justify-content:center; align-items:center;">
    <div class="card" onclick="event.stopPropagation()" style="background:#fff; width:500px; padding:30px;">
        <h2 id="mPdgId" style="margin:0; color:var(--accent);"></h2><h3 id="mTitle" style="border-bottom:1px solid #eee; padding-bottom:10px; margin-bottom:10px;"></h3><div id="mContent" style="line-height:1.6;"></div><br>
        <button class="btn-v" style="width:100%" onclick="closeModal()">FERMER</button>
    </div>
</div>

<script>
    // CONFIGURATION FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyA7zWuD_8yzhWARz-lSdHmDrcr7M9kHFHU",
        authDomain: "censeco-2026.firebaseapp.com",
        databaseURL: "https://censeco-2026-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "censeco-2026",
        storageBucket: "censeco-2026.firebasestorage.app",
        messagingSenderId: "1030152312862",
        appId: "1:1030152312862:web:9618132ec2bcfc7831b60f"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('missions_pdg');

    const SECTEURS = ["Med C PDG", "S1 San", "S3 San", "S4 San", "S6 San", "S7 San", "Det San CenSeco", "Off Li"];
    const RESPS = ["Chef Secours", "Méd C PDG", "S1 san", "S3 san", "S4 san", "S6 san", "S7 san", "Dét San CenSeco", "Off Li"];

    let db_missions = JSON.parse(localStorage.getItem('db_missions_v10_2')) || [];
    let counter_pdg = parseInt(localStorage.getItem('count_pdg_v10_2')) || 1;
    let collapsed = [];
    let timelineOps;
    const itemsOps = new vis.DataSet([]);
    const groupsOps = new vis.DataSet(SECTEURS.map(s => ({ id: s, content: s })));

    window.onload = () => {
        RESPS.forEach(r => document.getElementById('tResp').add(new Option(r, r)));
        SECTEURS.forEach(s => { document.getElementById('sectorGrid').innerHTML += `<label style="font-size:0.65em; font-weight:bold; cursor:pointer;"><input type="checkbox" name="sect" value="${s}"> ${s}</label>`; });
        initTimeline();
        
        // Synchro Cloud au démarrage
        dbRef.on('value', (snapshot) => {
            const cloud = snapshot.val();
            if(cloud && cloud.data) {
                db_missions = cloud.data;
                counter_pdg = cloud.counter;
                renderAll();
            } else {
                renderAll();
            }
        });

        setInputsTime();
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    };

    function addMission() {
        const idField = document.getElementById('editTaskId').value;
        const sects = Array.from(document.querySelectorAll('input[name="sect"]:checked')).map(cb => cb.value);
        if(!document.getElementById('tTitle').value || !sects.length) return alert("Données manquantes");
        
        const m = {
            id: idField ? parseInt(idField) : Date.now(),
            pdgId: idField ? db_missions.find(x=>x.id==idField).pdgId : "PDG-"+counter_pdg.toString().padStart(5,'0'),
            title: document.getElementById('tTitle').value, resp: document.getElementById('tResp').value,
            loc: document.getElementById('tLoc').value, start: document.getElementById('tStart').value,
            end: document.getElementById('tEnd').value || document.getElementById('tStart').value,
            priority: document.getElementById('tPrio').value, timeline: document.getElementById('tTL').checked,
            cpf: document.getElementById('tCPF').checked, note: document.getElementById('tNote').value,
            sector: sects, status: 'active', retexPos:'', retexNeg:'', retexImp:''
        };

        if(idField) db_missions[db_missions.findIndex(x=>x.id==idField)] = m;
        else { db_missions.push(m); counter_pdg++; }
        saveData(); resetForm();
    }

    function saveData() {
        localStorage.setItem('db_missions_v10_2', JSON.stringify(db_missions));
        localStorage.setItem('count_pdg_v10_2', counter_pdg);
        dbRef.set({ data: db_missions, counter: counter_pdg, lastUpdate: Date.now() });
        renderAll();
    }

    function renderAll() {
        const opCont = document.getElementById('opsList'); const p0Cont = document.getElementById('p0Container');
        const sasCont = document.getElementById('sasList'); const arcCont = document.getElementById('archiveList');
        opCont.innerHTML = ''; p0Cont.innerHTML = ''; sasCont.innerHTML = ''; arcCont.innerHTML = ''; itemsOps.clear();

        const active = db_missions.filter(m => m.status === 'active');
        const p0s = active.filter(m => m.priority == 0);
        if(p0s.length) {
            let h = `<table class="t-table"><thead><tr><th style="width:45px">P</th><th style="width:140px">Heure</th><th style="width:180px">Secteurs</th><th>Mission</th><th style="width:50px">TL</th><th style="width:50px">CPF</th><th style="width:150px">Actions</th></tr></thead><tbody>`;
            p0s.forEach(m => h += renderMissionRow(m, "P0"));
            p0Cont.innerHTML = h + `</tbody></table>`;
        }
        
        const grouped = {};
        active.filter(m => m.priority != 0).forEach(m => {
            let cur = new Date(m.start); cur.setHours(0,0,0,0);
            let endLimit = new Date(m.end); endLimit.setHours(0,0,0,0);
            while(cur <= endLimit) {
                let dKey = cur.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
                if(!grouped[dKey]) grouped[dKey] = []; grouped[dKey].push(m);
                cur.setDate(cur.getDate() + 1);
            }
        });

        Object.keys(grouped).forEach(date => {
            const isColl = collapsed.includes(date);
            const hasP1 = grouped[date].some(m => m.priority == 1);
            opCont.innerHTML += `<div class="date-sep ${isColl && hasP1 ? 'has-p1-alert' : ''}" onclick="toggleCollapse('${date}')"><span>🗓️ ${date.toUpperCase()}</span><span>${isColl?'[+]':'[-]'}</span></div>`;
            if(!isColl) {
                let h = `<table class="t-table"><tbody>`;
                grouped[date].sort((a,b)=>new Date(a.start)-new Date(b.start)).forEach(m => h += renderMissionRow(m, date));
                opCont.innerHTML += h + `</tbody></table>`;
            }
        });

        active.forEach(m => { if(m.timeline) m.sector.forEach(s => itemsOps.add({ id: m.id+'_'+s, group: s, start: new Date(m.start), end: new Date(m.end), content: m.pdgId+' | '+m.title, className: 'tl-p'+m.priority })); });
        db_missions.filter(m => m.status === 'sas').forEach(m => {
            sasCont.innerHTML += `<div class="card" style="background:#fff;"><div style="display:flex; justify-content:space-between; align-items:center;"><b>${m.pdgId} - ${m.title}</b><div><button class="btn-i" style="background:var(--accent)" onclick="setStatus(${m.id},'active')">🔄</button><button class="btn-i" style="background:var(--sas)" onclick="finalArchive(${m.id})">💾</button></div></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px;"><textarea id="pos-${m.id}" rows="3" placeholder="Positif">${m.retexPos}</textarea><textarea id="neg-${m.id}" rows="3" placeholder="Négatif">${m.retexNeg}</textarea><textarea id="imp-${m.id}" rows="3" placeholder="Amélioration">${m.retexImp}</textarea></div></div>`;
        });
        db_missions.filter(m => m.status === 'archived').forEach(m => {
            arcCont.innerHTML += `<div style="background:#fff; padding:10px; border-radius:8px; margin-bottom:5px; display:flex; justify-content:space-between; border:1px solid #cbd5e1;"><span><b>${m.pdgId}</b> - ${m.title}</span><div><button class="btn-i" style="background:#000" onclick="genPDF(${m.id})">PDF</button><button class="btn-i" style="background:var(--danger)" onclick="deleteMission(${m.id})">🗑️</button></div></div>`;
        });
        checkNextMissionBtn();
    }

    function renderMissionRow(m, dateStr) {
        const cleanD = dateStr.replace(/\s/g, ''); const s = new Date(m.start), e = new Date(m.end);
        return `<tr class="t-row ${m.priority==0?'row-p0':(m.priority==1?'row-p1':'')}" onclick="toggleDrawer('${m.id}','${cleanD}')">
            <td class="col-prio prio-${m.priority}">P${m.priority}</td>
            <td style="font-size:0.85em;"><div>${s.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div><div>${e.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></td>
            <td>${m.sector.map(sect=>`<span style="background:#eee;padding:2px 4px;border-radius:4px;margin-right:2px;font-size:0.75em;font-weight:bold;">${sect}</span>`).join('')}</td>
            <td><b>${m.pdgId}</b> - ${m.title}</td>
            <td style="text-align:center;font-weight:bold;color:${m.timeline?'var(--success)':'var(--danger)'}">${m.timeline?'OUI':'NON'}</td>
            <td style="text-align:center;font-weight:bold;color:${m.cpf?'var(--success)':'var(--danger)'}">${m.cpf?'OUI':'NON'}</td>
            <td style="text-align:right;">
                <button class="btn-i" style="background:var(--wa)" onclick="event.stopPropagation(); window.open('https://wa.me/?text='+encodeURIComponent('PDG: '+m.pdgId+' '+m.title))">📲</button>
                <button class="btn-i" style="background:var(--accent)" onclick="event.stopPropagation(); editMission(${m.id})">M</button>
                <button class="btn-i" style="background:var(--sas)" onclick="event.stopPropagation(); setStatus(${m.id},'sas')">S</button>
            </td>
        </tr>
        <tr><td colspan="7" style="padding:0; border:none;"><div id="dr-${m.id}-${cleanD}" style="display:none; padding:15px; background:#f8fafc; border-left:10px solid var(--accent); font-size:0.9em;"><b>📍 Lieu:</b> ${m.loc || '-'} | <b>👤 Resp:</b> ${m.resp}<br><b>📝 Note:</b> ${m.note || '-'}</div></td></tr>`;
    }

    function initTimeline() {
        timelineOps = new vis.Timeline(document.getElementById('vis-ops'), itemsOps, groupsOps, { stack: false, editable: false, showCurrentTime: true });
        timelineOps.on('select', (p) => { if(p.items.length) openModal(p.items[0].split('_')[0]); timelineOps.setSelection([]); });
        timelineOps.on('rangechanged', checkNextMissionBtn);
    }

    function setStatus(id, s) { db_missions[db_missions.findIndex(x=>x.id==id)].status = s; saveData(); }
    function deleteMission(id) { if(confirm("Supprimer ?")) { db_missions = db_missions.filter(x=>x.id!==id); saveData(); } }
    function finalArchive(id) { const idx = db_missions.findIndex(x=>x.id==id); db_missions[idx].retexPos = document.getElementById('pos-'+id).value; db_missions[idx].retexNeg = document.getElementById('neg-'+id).value; db_missions[idx].retexImp = document.getElementById('imp-'+id).value; db_missions[idx].status = 'archived'; saveData(); }
    function genPDF(id) {
        const m = db_missions.find(x=>x.id==id); const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFillColor(0); doc.rect(0,0,210,25,'F'); doc.setTextColor(255); doc.text(`CENSECO RETEX - ${m.pdgId}`, 20, 15);
        doc.setTextColor(0); doc.text(`Mission : ${m.title}`, 20, 40);
        doc.save(`${m.pdgId}_RETEX.pdf`);
    }

    function showPage(id, e) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        if(id.includes('timeline')) setTimeout(() => timelineOps.redraw(), 100);
    }

    function setInputsTime() {
        const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        const tStr = now.toISOString().slice(0, 16);
        document.getElementById('tStart').value = tStr;
        document.getElementById('tEnd').value = new Date(now.getTime() + 7200000).toISOString().slice(0, 16);
        document.getElementById('nextPdgId').innerText = "PDG-"+counter_pdg.toString().padStart(5,'0');
    }

    function toggleDrawer(id, d) { const el = document.getElementById(`dr-${id}-${d}`); el.style.display = el.style.display === 'block' ? 'none' : 'block'; }
    function toggleCollapse(d) { if(collapsed.includes(d)) collapsed = collapsed.filter(x=>x!==d); else collapsed.push(d); renderAll(); }
    function openModal(id) { const m = db_missions.find(x=>x.id==id); document.getElementById('mPdgId').innerText = m.pdgId; document.getElementById('mTitle').innerText = m.title; document.getElementById('mContent').innerHTML = `<p><b>Lieu:</b> ${m.loc || '-'}</p><p><b>Resp:</b> ${m.resp}</p><hr><p>${m.note || '-'}</p>`; document.getElementById('infoModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
    function resetForm() { document.getElementById('editTaskId').value = ''; document.getElementById('tTitle').value = ''; document.querySelectorAll('input[name="sect"]').forEach(cb=>cb.checked=false); setInputsTime(); }
    function editMission(id) { const m = db_missions.find(x=>x.id==id); document.getElementById('editTaskId').value = m.id; document.getElementById('tTitle').value = m.title; document.getElementById('tLoc').value = m.loc; document.getElementById('tStart').value = m.start; document.getElementById('tEnd').value = m.end; document.getElementById('tPrio').value = m.priority; document.querySelectorAll('input[name="sect"]').forEach(cb => cb.checked = m.sector.includes(cb.value)); window.scrollTo(0,0); }
    function checkNextMissionBtn() { const now = new Date(); const fut = db_missions.filter(m => m.status==='active' && new Date(m.start) > now).sort((a,b)=>new Date(a.start)-new Date(b.start)); const btn = document.getElementById('jump-next-mission'); if(btn && timelineOps) { const win = timelineOps.getWindow(); btn.style.display = (fut.length && new Date(fut[0].start) > win.end) ? 'block' : 'none'; } }
    function focusNextMission() { const fut = db_missions.filter(m => m.status==='active' && new Date(m.start) > new Date()).sort((a,b)=>new Date(a.start)-new Date(b.start)); if(fut.length) { timelineOps.setWindow(new Date(new Date(fut[0].start).getTime() - 7200000), new Date(new Date(fut[0].start).getTime() + 14400000)); } }
    function resetViewOps() { const n = new Date(); timelineOps.setWindow(new Date(n.getTime()-7200000), new Date(n.getTime()+28800000)); }
</script>
</body>
</html>
