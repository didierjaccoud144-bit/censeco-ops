<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENSECO 2026 - MONITOR V3.5</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #020617; --fids: #ffcc00; --accent: #38bdf8; 
            --p0: #ffff00; --p1: #ef4444; --p2: #3b82f6; --log: #4b5320;
            --date-bg: #ffffff; --date-text: #000000;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; box-sizing: border-box; padding-bottom: 50px; }
        
        header { border-bottom: 3px solid var(--fids); padding: 10px 0; margin-bottom: 20px; text-align: center; }
        .clock { font-family: monospace; font-size: 2.8em; font-weight: 900; color: var(--fids); line-height: 1; }
        
        .current-date-text { 
            font-size: 1.1em; 
            color: white; 
            opacity: 0.8; 
            margin-top: 8px; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .grid-monitor { display: flex; flex-direction: column; gap: 20px; }
        
        /* NOUEAU DESIGN BANDEAU DATE : FOND BLANC / TEXTE NOIR */
        .date-separator { 
            background: var(--date-bg); 
            color: var(--date-text); 
            padding: 15px; 
            font-weight: 900; 
            text-align: center; 
            text-transform: uppercase; 
            border-radius: 12px; 
            margin: 25px 0 10px 0; 
            border: 2px solid #cbd5e1;
            letter-spacing: 3px; 
            font-size: 1.3em;
            box-shadow: 0 5px 15px rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .card { 
            background: #1e293b; border-radius: 20px; overflow: hidden; 
            display: flex; flex-direction: column; min-height: 500px; 
            border: 2px solid rgba(255,255,255,0.1); 
            margin-bottom: 10px;
        }
        
        .card-header { padding: 15px; font-weight: 900; text-align: center; text-transform: uppercase; font-size: 1.2em; background: var(--p2); color: white; }
        .card.p0 .card-header { background: #000; color: var(--p0); animation: pulse 1.5s infinite; }
        .card.p1 .card-header { background: var(--p1); }
        .card.log .card-header { background: var(--log); color: white; }

        .card-body { padding: 25px; flex: 1; display: flex; flex-direction: column; justify-content: space-around; text-align: center; }
        .mission-title { font-size: 3em; font-weight: 900; line-height: 1.1; margin: 10px 0; color: var(--fids); text-transform: uppercase; }
        
        .card.p0 .card-body { background: var(--p0); color: #000; }
        .card.p0 .mission-title, .card.p0 .time-box, .card.p0 .loc-box { color: #000; }
        .card.p0 .loc-box { border-color: #000; background: rgba(0,0,0,0.05); }

        .loc-box { font-size: 2.2em; font-weight: 800; color: #fff; background: rgba(56, 189, 248, 0.2); padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid var(--accent); }
        .time-box { font-size: 1.8em; font-weight: 900; color: var(--accent); margin: 10px 0; }
        .meta-info { font-size: 1.3em; opacity: 0.9; margin-bottom: 10px; }
        
        .status-bar { display: flex; justify-content: center; gap: 20px; padding: 20px; background: rgba(0,0,0,0.4); }
        .badge { padding: 10px 20px; border-radius: 30px; font-weight: 900; }
        .badge.on { background: #15803d; color: white; }
        .badge.off { background: #475569; opacity: 0.5; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="clock" id="clock">00:00:00</div>
    <div id="dateDisplay" class="current-date-text">Chargement de la date...</div>
    <div id="count" style="font-weight: 800; color: var(--accent); margin-top: 15px; font-size: 0.8em; opacity: 0.5; text-transform: uppercase;">Sync Firebase...</div>
</header>

<div id="monitorBody" class="grid-monitor"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyA7zWuD_8yzhWARz-lSdHmDrcr7M9kHFHU", authDomain: "censeco-2026.firebaseapp.com", databaseURL: "https://censeco-2026-default-rtdb.europe-west1.firebasedatabase.app", projectId: "censeco-2026", storageBucket: "censeco-2026.firebasestorage.app", messagingSenderId: "1030152312862", appId: "1:1030152312862:web:9618132ec2bcfc7831b60f" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('missions_pdg');

    function updateHeader() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR');
        const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('dateDisplay').innerText = `Nous sommes le ${now.toLocaleDateString('fr-FR', options)}`;
    }

    dbRef.on('value', snap => {
        const data = snap.val();
        const missions = (data && data.data) ? data.data : [];
        renderMonitor(missions);
    });

    function renderMonitor(missions) {
        const body = document.getElementById('monitorBody');
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];

        let expandedMissions = [];

        // ÉTAPE 1 : DUPLICATION POUR MULTI-JOURS
        missions.forEach(m => {
            if (m.status !== 'active' && m.status !== 'En cours') return;

            const startDay = new Date(m.start.split('T')[0]);
            const endDay = m.end ? new Date(m.end.split('T')[0]) : new Date(m.start.split('T')[0]);

            let tempDate = new Date(startDay);
            while (tempDate <= endDay) {
                const isoDay = tempDate.toISOString().split('T')[0];
                
                // On n'affiche pas les jours déjà passés de la mission
                if (isoDay >= todayStr) {
                    expandedMissions.push({
                        ...m,
                        displayDateISO: isoDay
                    });
                }
                tempDate.setDate(tempDate.getDate() + 1);
            }
        });

        // ÉTAPE 2 : FILTRE DE FIN DE MISSION (Dernier jour + 15 min)
        const displayList = expandedMissions.filter(m => {
            if (!m.end) return true;
            const isLastDay = (m.displayDateISO === m.end.split('T')[0]);
            if (isLastDay) {
                const endLimit = new Date(m.end);
                endLimit.setMinutes(endLimit.getMinutes() + 15);
                return endLimit > now;
            }
            return true;
        });

        // ÉTAPE 3 : TRI CHRONOLOGIQUE (Date d'affichage puis heure de début)
        displayList.sort((a, b) => {
            if (a.displayDateISO !== b.displayDateISO) {
                return a.displayDateISO.localeCompare(b.displayDateISO);
            }
            return new Date(a.start) - new Date(b.start);
        });

        document.getElementById('count').innerText = displayList.length + " MISSION(S) ACTIVE(S) SUR LE MONITOR";
        
        if (displayList.length === 0) {
            body.innerHTML = '<div style="text-align:center; padding-top:100px; opacity:0.3; font-weight:900; font-size:1.5em;">AUCUNE MISSION ACTUELLE</div>';
            return;
        }

        let html = '';
        let lastDateHeader = '';

        displayList.forEach(m => {
            const currentDisplayDate = new Date(m.displayDateISO);
            const dateTitle = currentDisplayDate.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
            
            const hS = new Date(m.start).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            const hE = m.end ? new Date(m.end).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }) : '';

            if (m.displayDateISO !== lastDateHeader) {
                // Rendu du nouveau bandeau Date (symbole + texte)
                html += `<div class="date-separator"><span>🗓️</span> <span>${dateTitle}</span></div>`;
                lastDateHeader = m.displayDateISO;
            }

            let prioLabel = "Mission #" + m.pdgId;
            if (m.priority === 'p0') prioLabel = '🚨 PRIORITÉ ABSOLUE';
            if (m.priority === 'log') prioLabel = '⚪ MISSION LOGISTIQUE';

            html += `
            <div class="card ${m.priority}">
                <div class="card-header">${prioLabel}</div>
                <div class="card-body">
                    <div class="time-box">
                        <div style="font-size:0.6em; opacity:0.8; text-transform:uppercase; font-weight:800; color:var(--accent);">⏱️ ${dateTitle.split(' ')[0]}</div>
                        <div>DÉBUT : ${hS}</div>
                        ${hE ? `<div style="color:var(--p1); font-size:0.8em; font-weight:900;">FIN EST. : ${hE}</div>` : ''}
                    </div>
                    <h1 class="mission-title">${m.title.toUpperCase()}</h1>
                    <div class="loc-box">📍 ${m.loc.toUpperCase()}</div>
                    <div class="meta-info">
                        <b>Secteurs :</b> ${m.sectors || 'Tous'}<br>
                        <b>Resp :</b> ${m.resp}
                    </div>
                    ${m.note ? `<div style="font-style:italic; background:rgba(0,0,0,0.2); padding:10px; border-radius:10px; font-size:0.9em;">"${m.note}"</div>` : ''}
                </div>
                <div class="status-bar">
                    <div class="badge ${m.gcs ? 'on' : 'off'}">GCS</div>
                    <div class="badge ${m.cpf ? 'on' : 'off'}">CPF</div>
                </div>
            </div>`;
        });

        body.innerHTML = html;
    }

    setInterval(updateHeader, 1000);
    setInterval(() => {
        dbRef.once('value', snap => {
            const d = snap.val();
            if(d && d.data) renderMonitor(d.data);
        });
    }, 60000);

    updateHeader();
</script>
</body>
</html>
