<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENSECO 2026 - OPS V11.0 (ULTIME)</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
    
    <style>
        :root { --bg: #f1f5f9; --fids: #ffcc00; --accent: #4338ca; --success: #15803d; --danger: #dc2626; --dark: #1e293b; }
        
        body { font-family: 'Segoe UI', Arial, sans-serif !important; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #000; color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--fids); flex-shrink: 0; }
        
        .nav-main { display: flex; background: #fff; border-bottom: 1px solid #cbd5e1; flex-shrink: 0; }
        .nav-btn { padding: 15px 20px; cursor: pointer; border: none; background: none; font-weight: 900; opacity: 0.4; text-transform: uppercase; font-size: 0.8em; }
        .nav-btn.active { opacity: 1; border-bottom: 4px solid var(--accent); color: var(--accent); }
        
        .container { flex: 1; overflow-y: auto; padding: 15px; }
        .page { display: none; }
        .page.active { display: block !important; }

        /* FORÇAGE DES TABLEAUX */
        table.master-table { width: 100% !important; border-collapse: separate !important; border-spacing: 0 8px !important; table-layout: fixed !important; }
        .master-table th { background: none !important; color: #64748b !important; font-size: 0.7em !important; text-transform: uppercase !important; padding: 8px !important; text-align: left !important; }
        .master-table td { background: #fff !important; padding: 12px !important; border-top: 1px solid #cbd5e1 !important; border-bottom: 1px solid #cbd5e1 !important; vertical-align: middle !important; }

        .prio-indicator { width: 12px !important; padding: 0 !important; border-radius: 4px 0 0 4px !important; }
        
        /* COULEURS DES LIGNES */
        .row-p0 td { background-color: #ffcc00 !important; color: #000 !important; font-weight: 900 !important; border-color: #000 !important; }
        
        .date-header { background: var(--dark) !important; color: var(--fids) !important; padding: 12px !important; font-weight: 900 !important; border-radius: 8px !important; margin: 20px 0 5px 0 !important; display: flex !important; justify-content: space-between !important; }

        .btn-action { padding: 8px 12px; border-radius: 6px; border: none; color: #fff; font-weight: 900; cursor: pointer; font-size: 0.7em; }
        .drawer-box { display: none; padding: 15px; background: #f1f5f9; border-left: 10px solid var(--accent); margin-top: -8px; border-bottom: 1px solid #cbd5e1; }

        /* TIMELINE FIX */
        .vis-panel { background: #0f172a !important; color: white !important; }
        .vis-item { font-weight: bold !important; color: white !important; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900;">CENSECO 2026 - OPS <span style="color:var(--fids)">V11.0 ULTIME</span></div>
    <div id="clock">00:00:00</div>
</header>

<div class="nav-main">
    <button class="nav-btn active" onclick="showPage('ops', event)">📋 OPERATIONS</button>
    <button class="nav-btn" onclick="showPage('timeline-ops', event)">🗓️ TIMELINE</button>
    <button class="nav-btn" onclick="showPage('retex', event)">📦 RETEX</button>
</div>

<div class="container">
    <div id="ops" class="page active">
        <div style="background:#e2e8f0; padding:15px; border-radius:10px; margin-bottom:20px; border:1px solid #cbd5e1;">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <div id="nextPdgId" style="background:#000; color:#ffcc00; padding:10px; font-weight:900; border-radius:5px;">PDG-XXXXX</div>
                <input type="text" id="tTitle" placeholder="Titre Mission" style="flex:1; padding:10px; border-radius:5px; border:1px solid #ccc;">
                <select id="tResp" style="padding:10px;"></select>
            </div>
            <div id="sectorGrid" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px; background:#fff; padding:10px; border-radius:5px; margin-bottom:10px;"></div>
            <div style="display:flex; gap:10px;">
                <input type="datetime-local" id="tStart" style="padding:8px;">
                <select id="tPrio"><option value="0">P0</option><option value="1">P1</option><option value="2" selected>P2</option></select>
                <input type="text" id="tNote" placeholder="Notes..." style="flex:1; padding:8px;">
                <button onclick="addMission()" style="background:#15803d; color:#fff; border:none; padding:10px 20px; font-weight:900; border-radius:5px; cursor:pointer;">VALIDER</button>
            </div>
        </div>

        <div id="p0Container"></div>
        <div id="opsList"></div>
    </div>

    <div id="timeline-ops" class="page">
        <div id="vis-ops" style="height:500px; border:2px solid #334155; border-radius:10px;"></div>
    </div>

    <div id="retex" class="page">
        <div id="sasList"></div>
        <div id="archiveList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7zWuD_8yzhWARz-lSdHmDrcr7M9kHFHU",
        authDomain: "censeco-2026.firebaseapp.com",
        databaseURL: "https://censeco-2026-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "censeco-2026",
        storageBucket: "censeco-2026.firebasestorage.app",
        messagingSenderId: "1030152312862",
        appId: "1:1030152312862:web:9618132ec2bcfc7831b60f"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('missions_pdg');
    const SECTEURS = ["Med C PDG", "S1 San", "S3 San", "S4 San", "S6 San", "S7 San", "Det San CenSeco", "Off Li"];
    const RESPS = ["Chef Secours", "Méd C PDG", "S1 san", "S3 san", "S4 san", "S6 san", "S7 san", "Dét San CenSeco", "Off Li"];

    let db_missions = [];
    let counter_pdg = 1;
    let timelineOps;
    const itemsOps = new vis.DataSet([]);
    const groupsOps = new vis.DataSet(SECTEURS.map(s => ({ id: s, content: s })));

    window.onload = () => {
        RESPS.forEach(r => document.getElementById('tResp').add(new Option(r, r)));
        SECTEURS.forEach(s => { document.getElementById('sectorGrid').innerHTML += `<label style="font-size:0.7em; font-weight:bold;"><input type="checkbox" name="sect" value="${s}"> ${s}</label>`; });
        
        initTimeline();
        
        dbRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                db_missions = data.data || [];
                counter_pdg = data.counter || 1;
                renderAll();
            }
        });

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
        const n = new Date(); n.setMinutes(n.getMinutes() - n.getTimezoneOffset());
        document.getElementById('tStart').value = n.toISOString().slice(0, 16);
    };

    function addMission() {
        const title = document.getElementById('tTitle').value;
        const sects = Array.from(document.querySelectorAll('input[name="sect"]:checked')).map(cb => cb.value);
        if(!title || !sects.length) return alert("Données manquantes");

        const m = {
            id: Date.now(),
            pdgId: "PDG-"+counter_pdg.toString().padStart(5,'0'),
            title: title,
            start: document.getElementById('tStart').value,
            end: document.getElementById('tStart').value,
            priority: document.getElementById('tPrio').value,
            sector: sects,
            note: document.getElementById('tNote').value,
            status: 'active'
        };

        db_missions.push(m);
        counter_pdg++;
        dbRef.set({ data: db_missions, counter: counter_pdg });
        document.getElementById('tTitle').value = '';
    }

    function renderAll() {
        const opCont = document.getElementById('opsList'); const p0Cont = document.getElementById('p0Container');
        opCont.innerHTML = ''; p0Cont.innerHTML = ''; itemsOps.clear();

        const active = db_missions.filter(m => m.status === 'active');

        // P0
        const p0s = active.filter(m => m.priority == 0);
        if(p0s.length) {
            let h = `<table class="master-table"><thead><tr><th style="width:15px"></th><th style="width:100px">HEURE</th><th>MISSION</th><th style="width:120px"></th></tr></thead><tbody>`;
            p0s.forEach(m => h += renderRow(m, "P0"));
            p0Cont.innerHTML = h + `</tbody></table>`;
        }

        const grouped = {};
        active.filter(m => m.priority != 0).forEach(m => {
            let d = new Date(m.start).toLocaleDateString('fr-FR', {weekday:'long', day:'numeric'});
            if(!grouped[d]) grouped[d] = []; grouped[d].push(m);
        });

        Object.keys(grouped).forEach(date => {
            opCont.innerHTML += `<div class="date-header"><span>🗓️ ${date.toUpperCase()}</span></div>`;
            let h = `<table class="master-table"><tbody>`;
            grouped[date].sort((a,b)=>new Date(a.start)-new Date(b.start)).forEach(m => h += renderRow(m, date));
            opCont.innerHTML += h + `</tbody></table>`;
        });

        active.forEach(m => { m.sector.forEach(s => itemsOps.add({ group: s, start: new Date(m.start), end: new Date(m.start).getTime()+3600000, content: m.title, className: 'tl-p'+m.priority })); });
        document.getElementById('nextPdgId').innerText = "PDG-"+counter_pdg.toString().padStart(5,'0');
    }

    function renderRow(m, d) {
        const s = new Date(m.start);
        const color = m.priority == 0 ? '#000' : (m.priority == 1 ? 'red' : 'blue');
        return `<tr class="${m.priority==0?'row-p0':''}" onclick="document.getElementById('dr-${m.id}').style.display = document.getElementById('dr-${m.id}').style.display==='block'?'none':'block'">
            <td class="prio-indicator" style="background:${color} !important;"></td>
            <td style="font-weight:bold;">${s.getHours()}:${s.getMinutes().toString().padStart(2,'0')}</td>
            <td><b>${m.pdgId}</b> - ${m.title}<br><small>${m.sector.join(', ')}</small></td>
            <td style="text-align:right;">
                <button class="btn-action" style="background:#4338ca" onclick="event.stopPropagation(); alert('Notes: '+ '${m.note}')">INFO</button>
                <button class="btn-action" style="background:#f97316" onclick="event.stopPropagation(); setStatus(${m.id},'sas')">FIN</button>
            </td>
        </tr>
        <tr><td colspan="4" style="padding:0; border:none;"><div id="dr-${m.id}" class="drawer-box"><b>NOTES :</b> ${m.note || 'Aucune note.'}</div></td></tr>`;
    }

    function initTimeline() {
        timelineOps = new vis.Timeline(document.getElementById('vis-ops'), itemsOps, groupsOps, { stack: false });
    }

    function setStatus(id, s) { db_missions[db_missions.findIndex(x=>x.id==id)].status = s; dbRef.set({ data: db_missions, counter: counter_pdg }); }
    function showPage(id, e) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
    }
</script>
</body>
</html>
