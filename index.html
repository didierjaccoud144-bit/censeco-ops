<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENSECO 2026 - OPS V10.2 (CLOUD)</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22black%22/><text y=%22.85em%22 x=%2212%22 font-size=%2275%22>📡</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><text y=%22.85em%22 x=%2212%22 font-size=%2275%22>📡</text></svg>">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="CenSeco OPS">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --bg: #f1f5f9; --fids: #ffcc00; --accent: #4338ca; --success: #15803d; --danger: #dc2626; --wa: #128c7e; --sas: #f97316; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #000; color: #fff; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--fids); z-index: 1001; }
        .nav-main { display: flex; background: #fff; border-bottom: 1px solid #cbd5e1; flex-shrink: 0; overflow-x: auto; }
        .nav-btn { padding: 15px 25px; cursor: pointer; border: none; background: none; font-weight: bold; opacity: 0.5; font-size: 0.9em; white-space: nowrap; }
        .nav-btn.active { opacity: 1; border-bottom: 3px solid var(--accent); color: var(--accent); }
        .container { flex: 1; overflow-y: auto; padding: 20px; position: relative; }
        .page { display: none; } .page.active { display: block; }
        .card { background: #e2e8f0; padding: 18px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 20px; }
        .row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 10px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 0.65em; font-weight: 900; color: #475569; text-transform: uppercase; }
        input, select, textarea { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: 800; background: #fff; }
        .t-table { width: 100%; border-collapse: separate; border-spacing: 0 5px; table-layout: fixed; }
        .t-row td { background: #fff; padding: 12px; border-top: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1; vertical-align: middle; }
        .col-prio { width: 45px; text-align: center; font-weight: 900; border-left: 8px solid transparent; border-radius: 6px 0 0 6px; }
        .prio-0 { border-left-color: #000 !important; } .prio-1 { border-left-color: var(--danger) !important; }
        .row-p0 td { background-color: #ffff00 !important; color: #000 !important; border-top: 2px solid #000 !important; border-bottom: 2px solid #000 !important; }
        .row-p1 td { animation: pulse-p1 1.5s infinite; }
        @keyframes pulse-p1 { 0%, 100% { background-color: #fff; } 50% { background-color: rgba(220, 38, 38, 0.15); } }
        .vis-container { background: #0f172a !important; border-radius: 10px; border: 2px solid #334155; height: 600px; }
        .vis-label { color: var(--fids) !important; font-weight: bold; background: #1e293b !important; }
        .vis-item { border-radius: 4px !important; border-width: 0 0 0 6px !important; font-weight: bold; }
        .tl-p0 { background: #ffff00 !important; color: #000 !important; border-color: #000 !important; }
        .tl-p1 { background: #dc2626 !important; color: #fff !important; border-color: #7f1d1d !important; }
        .tl-p2 { background: #4338ca !important; color: #fff !important; border-color: #1e1b4b !important; }
        .btn-v { background: var(--success); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .btn-i { height: 32px; min-width: 40px; border-radius: 6px; border: none; color: #fff; font-weight: 900; cursor: pointer; margin-left: 4px; display: inline-flex; align-items: center; justify-content: center; }
        .floating-nav { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .btn-float { background: #1e293b; color: var(--fids); border: 2px solid #fff; padding: 10px 18px; border-radius: 30px; font-weight: 900; cursor: pointer; font-size: 0.75em; text-transform: uppercase; }
        .footer { text-align: center; padding: 10px; font-size: 0.7em; opacity: 0.5; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900;">CENSECO 2026 - OPS (CLOUD)</div>
    <div id="clock" style="font-family: monospace; color: var(--fids); font-size: 1.2em;">00:00:00</div>
</header>

<div class="nav-main">
    <button class="nav-btn active" onclick="showPage('ops', event)">📋 OPERATIONS</button>
    <button class="nav-btn" onclick="showPage('timeline-ops', event)">🗓️ TIMELINE</button>
    <button class="nav-btn" onclick="showPage('retex', event)">📦 RETEX</button>
</div>

<div class="container">
    <div id="ops" class="page active">
        <div class="card">
            <input type="hidden" id="editTaskId">
            <div class="row">
                <div id="nextPdgId" style="background:#000;color:var(--fids);padding:8px;border-radius:6px;font-family:monospace;font-weight:bold;border:1px solid var(--fids);">PDG-00001</div>
                <div class="field" style="flex:1;"><label>Titre Mission</label><input type="text" id="tTitle"></div>
                <div class="field"><label>Responsable</label><select id="tResp"></select></div>
                <div id="sectorGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;background:#fff;padding:8px;border-radius:8px;border:1px solid #cbd5e1;"></div>
            </div>
            <div class="row">
                <div class="field"><label>Lieu</label><input type="text" id="tLoc" style="width:180px;"></div>
                <div class="field"><label>Début</label><input type="datetime-local" id="tStart"></div>
                <div class="field"><label>Fin</label><input type="datetime-local" id="tEnd"></div>
                <div class="field"><label>Prio</label>
                    <select id="tPrio"><option value="0">🚨 P0</option><option value="1">P1</option><option value="2" selected>P2</option><option value="3">P3</option></select>
                </div>
                <div class="field"><label>TL</label><input type="checkbox" id="tTL" checked></div>
                <div class="field"><label>CPF</label><input type="checkbox" id="tCPF"></div>
                <input type="text" id="tNote" placeholder="Notes / Observations" style="flex:1">
                <button class="btn-v" onclick="addMission()">VALIDER MISSION</button>
            </div>
        </div>
        <div id="p0Container"></div>
        <div id="opsList"></div>
    </div>

    <div id="timeline-ops" class="page">
        <div id="vis-ops" class="vis-container"></div>
        <div class="floating-nav">
            <button class="btn-float" onclick="resetViewOps()">🎯 Vue Standard</button>
        </div>
    </div>

    <div id="retex" class="page">
        <h2 style="color:var(--sas); border-bottom:2px solid var(--sas); padding-bottom:10px;">📥 SAS DE CLÔTURE</h2>
        <div id="sasList"></div>
        <h2 style="color:var(--accent); border-bottom:2px solid var(--accent); margin-top:40px; padding-bottom:10px;">🗄️ ARCHIVES</h2>
        <div id="archiveList"></div>
    </div>
</div>

<div class="footer">Une création DJA’WEB avec l’aide de Gemini IA</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7zWuD_8yzhWARz-lSdHmDrcr7M9kHFHU",
        authDomain: "censeco-2026.firebaseapp.com",
        databaseURL: "https://censeco-2026-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "censeco-2026",
        storageBucket: "censeco-2026.firebasestorage.app",
        messagingSenderId: "1030152312862",
        appId: "1:1030152312862:web:9618132ec2bcfc7831b60f"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('missions_pdg');

    const SECTEURS = ["Med C PDG", "S1 San", "S3 San", "S4 San", "S6 San", "S7 San", "Det San CenSeco", "Off Li"];
    const RESPS = ["Chef Secours", "Méd C PDG", "S1 san", "S3 san", "S4 san", "S6 san", "S7 san", "Dét San CenSeco", "Off Li"];

    let db_missions = [];
    let counter_pdg = 1;
    let timelineOps;
    const itemsOps = new vis.DataSet([]);
    const groupsOps = new vis.DataSet(SECTEURS.map(s => ({ id: s, content: s })));

    window.onload = () => {
        RESPS.forEach(r => document.getElementById('tResp').add(new Option(r, r)));
        SECTEURS.forEach(s => { document.getElementById('sectorGrid').innerHTML += `<label style="font-size:0.65em; font-weight:bold;"><input type="checkbox" name="sect" value="${s}"> ${s}</label>`; });
        initTimeline();
        
        dbRef.on('value', (snapshot) => {
            const cloud = snapshot.val();
            if(cloud && cloud.data) {
                db_missions = cloud.data;
                counter_pdg = cloud.counter;
                renderAll();
            }
        });

        setInputsTime();
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    };

    function addMission() {
        const idField = document.getElementById('editTaskId').value;
        const sects = Array.from(document.querySelectorAll('input[name="sect"]:checked')).map(cb => cb.value);
        const m = {
            id: idField ? parseInt(idField) : Date.now(),
            pdgId: idField ? db_missions.find(x=>x.id==idField).pdgId : "PDG-"+counter_pdg.toString().padStart(5,'0'),
            title: document.getElementById('tTitle').value, resp: document.getElementById('tResp').value,
            loc: document.getElementById('tLoc').value, start: document.getElementById('tStart').value,
            end: document.getElementById('tEnd').value || document.getElementById('tStart').value,
            priority: document.getElementById('tPrio').value, timeline: document.getElementById('tTL').checked,
            cpf: document.getElementById('tCPF').checked, note: document.getElementById('tNote').value,
            sector: sects, status: 'active', retexPos:'', retexNeg:'', retexImp:''
        };
        if(idField) db_missions[db_missions.findIndex(x=>x.id==idField)] = m;
        else { db_missions.push(m); counter_pdg++; }
        saveData(); resetForm();
    }

    function saveData() {
        dbRef.set({ data: db_missions, counter: counter_pdg, lastUpdate: Date.now() });
    }

    function renderAll() {
        const opCont = document.getElementById('opsList'); const p0Cont = document.getElementById('p0Container');
        opCont.innerHTML = ''; p0Cont.innerHTML = ''; itemsOps.clear();
        const active = db_missions.filter(m => m.status === 'active');
        active.forEach(m => {
            if(m.priority == 0) p0Cont.innerHTML += `PDG ${m.pdgId} - ${m.title} <br>`;
            else opCont.innerHTML += `PDG ${m.pdgId} - ${m.title} <br>`;
            if(m.timeline) m.sector.forEach(s => itemsOps.add({ id: m.id+'_'+s, group: s, start: new Date(m.start), end: new Date(m.end), content: m.title, className: 'tl-p'+m.priority }));
        });
    }

    function initTimeline() {
        timelineOps = new vis.Timeline(document.getElementById('vis-ops'), itemsOps, groupsOps, { stack: false, showCurrentTime: true });
    }

    function showPage(id, e) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'timeline-ops') setTimeout(() => timelineOps.redraw(), 100);
    }

    function setInputsTime() {
        const n = new Date(); n.setMinutes(n.getMinutes() - n.getTimezoneOffset());
        document.getElementById('tStart').value = n.toISOString().slice(0, 16);
    }

    function resetForm() { document.getElementById('editTaskId').value = ''; document.getElementById('tTitle').value = ''; setInputsTime(); }
    function resetViewOps() { timelineOps.setWindow(new Date(), new Date(Date.now() + 8 * 3600000)); }
</script>
</body>
</html>
