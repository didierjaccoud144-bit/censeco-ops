<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENSECO 2026 - OPS V10.6 (BUNKER)</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22black%22/><text y=%22.85em%22 x=%2212%22 font-size=%2275%22>📡</text></svg>">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />
    
    <style>
        :root { --bg: #f1f5f9; --fids: #ffcc00; --accent: #4338ca; --success: #15803d; --danger: #dc2626; --sas: #f97316; }
        
        /* STRUCTURE FORCÉE */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #000; color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--fids); flex-shrink: 0; }
        
        .nav-main { display: flex; background: #fff; border-bottom: 1px solid #cbd5e1; flex-shrink: 0; }
        .nav-btn { padding: 15px 25px; cursor: pointer; border: none; background: none; font-weight: 900; opacity: 0.4; text-transform: uppercase; font-size: 0.85em; }
        .nav-btn.active { opacity: 1; border-bottom: 4px solid var(--accent); color: var(--accent); }
        
        .container { flex: 1; overflow-y: auto !important; padding: 20px; position: relative; display: block !important; }
        .page { display: none; width: 100%; } 
        .page.active { display: block !important; }
        
        /* TABLEAUX TACTIQUES (FORÇAGE) */
        .t-table { width: 100% !important; border-collapse: separate !important; border-spacing: 0 6px !important; display: table !important; margin-bottom: 15px; table-layout: fixed; }
        .t-table thead { display: table-header-group !important; }
        .t-table tbody { display: table-row-group !important; }
        .t-table tr { display: table-row !important; }
        .t-table th { display: table-cell !important; padding: 10px; font-size: 0.7em; text-transform: uppercase; color: #64748b; font-weight: 900; text-align: left; }
        .t-table td { display: table-cell !important; background: #fff; padding: 12px; border-top: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1; vertical-align: middle; }

        /* PRIORITÉS */
        .col-prio { width: 50px !important; text-align: center; font-weight: 900; border-left: 10px solid transparent !important; border-radius: 6px 0 0 6px; }
        .prio-0 { border-left-color: #000 !important; }
        .prio-1 { border-left-color: var(--danger) !important; }
        .prio-2 { border-left-color: var(--accent) !important; }
        
        .row-p0 td { background-color: #ffff00 !important; color: #000 !important; border-top: 2px solid #000 !important; border-bottom: 2px solid #000 !important; }

        /* SÉPARATEURS */
        .date-sep { background: #1e293b !important; color: var(--fids) !important; padding: 12px 15px !important; font-weight: 900; font-size: 0.9em; border-radius: 8px; margin: 25px 0 10px 0; display: flex !important; justify-content: space-between; align-items: center; }

        /* FORMULAIRE */
        .card { background: #e2e8f0; padding: 20px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 25px; }
        .row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 0.65em; font-weight: 900; color: #475569; text-transform: uppercase; }
        input, select { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: 800; background: #fff; }

        .vis-container { background: #0f172a !important; border-radius: 12px; border: 2px solid #334155; height: 500px !important; }
        .btn-v { background: var(--success); color: #fff; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .btn-i { padding: 8px 12px; border-radius: 6px; border: none; color: #fff; font-weight: 900; cursor: pointer; margin-left: 5px; font-size: 0.75em; }
        .drawer { display: none; padding: 15px; background: #f8fafc; border-left: 12px solid var(--accent); border-radius: 0 0 8px 8px; border-bottom: 1px solid #cbd5e1; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; font-size: 1.2em;">CENSECO 2026 - <span style="color:var(--fids)">OPS V10.6</span></div>
    <div id="clock" style="font-family: monospace; color: var(--fids); font-size: 1.3em;">00:00:00</div>
</header>

<div class="nav-main">
    <button class="nav-btn active" onclick="showPage('ops', event)">📋 OPERATIONS</button>
    <button class="nav-btn" onclick="showPage('timeline-ops', event)">🗓️ TIMELINE</button>
    <button class="nav-btn" onclick="showPage('retex', event)">📦 RETEX</button>
</div>

<div class="container">
    <div id="ops" class="page active">
        <div class="card">
            <input type="hidden" id="editTaskId">
            <div class="row">
                <div id="nextPdgId" style="background:#000;color:var(--fids);padding:12px;border-radius:8px;font-weight:900;border:2px solid var(--fids); font-size:1.1em;">PDG-XXXXX</div>
                <div class="field" style="flex:1;"><label>Mission</label><input type="text" id="tTitle" placeholder="Titre de l'intervention"></div>
                <div class="field"><label>Responsable</label><select id="tResp"></select></div>
                <div id="sectorGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:#fff;padding:10px;border-radius:10px;border:1px solid #cbd5e1;"></div>
            </div>
            <div class="row" style="margin-top:15px;">
                <div class="field"><label>Début</label><input type="datetime-local" id="tStart"></div>
                <div class="field"><label>Fin</label><input type="datetime-local" id="tEnd"></div>
                <div class="field"><label>Prio</label>
                    <select id="tPrio"><option value="0">🚨 P0</option><option value="1">P1</option><option value="2" selected>P2</option></select>
                </div>
                <div class="field"><label>Timeline</label><input type="checkbox" id="tTL" checked style="width:20px;height:20px;"></div>
                <input type="text" id="tLoc" placeholder="Lieu précis" style="width:150px">
                <input type="text" id="tNote" placeholder="Notes..." style="flex:1">
                <button class="btn-v" onclick="addMission()">VALIDER MISSION</button>
            </div>
        </div>
        <div id="p0Container"></div>
        <div id="opsList"></div>
    </div>

    <div id="timeline-ops" class="page">
        <div id="vis-ops" class="vis-container"></div>
    </div>

    <div id="retex" class="page">
        <div id="sasList"></div>
        <div id="archiveList" style="margin-top:30px;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7zWuD_8yzhWARz-lSdHmDrcr7M9kHFHU",
        authDomain: "censeco-2026.firebaseapp.com",
        databaseURL: "https://censeco-2026-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "censeco-2026",
        storageBucket: "censeco-2026.firebasestorage.app",
        messagingSenderId: "1030152312862",
        appId: "1:1030152312862:web:9618132ec2bcfc7831b60f"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('missions_pdg');
    const SECTEURS = ["Med C PDG", "S1 San", "S3 San", "S4 San", "S6 San", "S7 San", "Det San CenSeco", "Off Li"];
    const RESPS = ["Chef Secours", "Méd C PDG", "S1 san", "S3 san", "S4 san", "S6 san", "S7 san", "Dét San CenSeco", "Off Li"];

    let db_missions = [];
    let counter_pdg = 1;
    let collapsed = [];
    let timelineOps;
    const itemsOps = new vis.DataSet([]);
    const groupsOps = new vis.DataSet(SECTEURS.map(s => ({ id: s, content: s })));

    window.onload = () => {
        RESPS.forEach(r => document.getElementById('tResp').add(new Option(r, r)));
        SECTEURS.forEach(s => { document.getElementById('sectorGrid').innerHTML += `<label style="font-size:0.7em;font-weight:bold;"><input type="checkbox" name="sect" value="${s}"> ${s}</label>`; });
        initTimeline();
        dbRef.on('value', snap => {
            const data = snap.val();
            if(data) { db_missions = data.data || []; counter_pdg = data.counter || 1; renderAll(); }
        });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
        setInputsTime();
    };

    function addMission() {
        const id = document.getElementById('editTaskId').value;
        const sects = Array.from(document.querySelectorAll('input[name="sect"]:checked')).map(cb => cb.value);
        if(!document.getElementById('tTitle').value || !sects.length) return alert("Champs obligatoires manquants");
        
        const m = {
            id: id ? parseInt(id) : Date.now(),
            pdgId: id ? db_missions.find(x=>x.id==id).pdgId : "PDG-"+counter_pdg.toString().padStart(5,'0'),
            title: document.getElementById('tTitle').value, resp: document.getElementById('tResp').value,
            loc: document.getElementById('tLoc').value, start: document.getElementById('tStart').value,
            end: document.getElementById('tEnd').value || document.getElementById('tStart').value,
            priority: document.getElementById('tPrio').value, timeline: document.getElementById('tTL').checked,
            sector: sects, note: document.getElementById('tNote').value, status: 'active'
        };

        if(id) db_missions[db_missions.findIndex(x=>x.id==id)] = m;
        else { db_missions.push(m); counter_pdg++; }
        saveData(); resetForm();
    }

    function renderAll() {
        const opCont = document.getElementById('opsList'); const p0Cont = document.getElementById('p0Container');
        opCont.innerHTML = ''; p0Cont.innerHTML = ''; itemsOps.clear();
        const active = db_missions.filter(m => m.status === 'active');

        // P0 SECTION
        const p0s = active.filter(m => m.priority == 0);
        if(p0s.length) {
            let h = `<table class="t-table"><thead><tr><th style="width:50px">P</th><th style="width:130px">Heure</th><th>Mission</th><th style="width:150px">Actions</th></tr></thead><tbody>`;
            p0s.forEach(m => h += renderRow(m, "P0"));
            p0Cont.innerHTML = h + `</tbody></table>`;
        }

        const grouped = {};
        active.filter(m => m.priority != 0).forEach(m => {
            let d = new Date(m.start).toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
            if(!grouped[d]) grouped[d] = []; grouped[d].push(m);
        });

        Object.keys(grouped).forEach(date => {
            const isColl = collapsed.includes(date);
            opCont.innerHTML += `<div class="date-sep" onclick="toggleCollapse('${date}')"><span>🗓️ ${date.toUpperCase()}</span><span>${isColl?'[+]':'[-]'}</span></div>`;
            if(!isColl) {
                let h = `<table class="t-table"><tbody>`;
                grouped[date].sort((a,b)=>new Date(a.start)-new Date(b.start)).forEach(m => h += renderRow(m, date));
                opCont.innerHTML += h + `</tbody></table>`;
            }
        });

        active.forEach(m => { if(m.timeline) m.sector.forEach(s => itemsOps.add({ id: m.id+'_'+s, group: s, start: new Date(m.start), end: new Date(m.end), content: m.title, className: 'tl-p'+m.priority })); });
    }

    function renderRow(m, d) {
        const cleanD = d.replace(/\s/g, '');
        const s = new Date(m.start), e = new Date(m.end);
        return `<tr class="t-row ${m.priority==0?'row-p0':''}" onclick="toggleDrawer('${m.id}','${cleanD}')">
            <td class="col-prio prio-${m.priority}">P${m.priority}</td>
            <td style="font-weight:bold; font-size:0.85em;">${s.getHours()}:${s.getMinutes().toString().padStart(2,'0')} - ${e.getHours()}:${e.getMinutes().toString().padStart(2,'0')}</td>
            <td><b>${m.pdgId}</b> - ${m.title}<br><small style="color:#64748b">${m.sector.join(', ')}</small></td>
            <td style="text-align:right;">
                <button class="btn-i" style="background:var(--accent)" onclick="event.stopPropagation(); editMission(${m.id})">EDIT</button>
                <button class="btn-i" style="background:var(--sas)" onclick="event.stopPropagation(); setStatus(${m.id},'sas')">FIN</button>
            </td>
        </tr>
        <tr><td colspan="4" style="padding:0; border:none;"><div id="dr-${m.id}-${cleanD}" class="drawer"><b>📍 Lieu :</b> ${m.loc} | <b>👤 Resp :</b> ${m.resp}<br><b>📝 Notes :</b> ${m.note}</div></td></tr>`;
    }

    function initTimeline() {
        timelineOps = new vis.Timeline(document.getElementById('vis-ops'), itemsOps, groupsOps, { stack: false, showCurrentTime: true });
    }

    function saveData() { dbRef.set({ data: db_missions, counter: counter_pdg }); }
    function setStatus(id, s) { db_missions[db_missions.findIndex(x=>x.id==id)].status = s; saveData(); }
    function editMission(id) { 
        const m = db_missions.find(x=>x.id==id); 
        document.getElementById('editTaskId').value = m.id; 
        document.getElementById('tTitle').value = m.title; 
        document.getElementById('tLoc').value = m.loc;
        document.getElementById('tNote').value = m.note;
        document.getElementById('tPrio').value = m.priority;
        document.querySelectorAll('input[name="sect"]').forEach(cb => cb.checked = m.sector.includes(cb.value));
        window.scrollTo(0,0); 
    }
    function toggleDrawer(id, d) { const el = document.getElementById(`dr-${id}-${d}`); el.style.display = el.style.display === 'block' ? 'none' : 'block'; }
    function toggleCollapse(d) { if(collapsed.includes(d)) collapsed = collapsed.filter(x=>x!==d); else collapsed.push(d); renderAll(); }
    function setInputsTime() { const n = new Date(); n.setMinutes(n.getMinutes() - n.getTimezoneOffset()); document.getElementById('tStart').value = n.toISOString().slice(0, 16); document.getElementById('nextPdgId').innerText = "PDG-"+counter_pdg.toString().padStart(5,'0'); }
    function resetForm() { document.getElementById('editTaskId').value = ''; document.querySelectorAll('input[name="sect"]').forEach(cb=>cb.checked=false); setInputsTime(); }
    function showPage(id, e) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); e.target.classList.add('active'); if(id === 'timeline-ops') setTimeout(() => timelineOps.redraw(), 100); }
</script>
</body>
</html>
