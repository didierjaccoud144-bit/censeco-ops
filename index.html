<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENSECO 2026 - OPS V10.8 (DIAG)</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22black%22/><text y=%22.85em%22 x=%2212%22 font-size=%2275%22>📡</text></svg>">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />
    
    <style>
        :root { --bg: #f1f5f9; --fids: #ffcc00; --accent: #4338ca; --success: #15803d; --danger: #dc2626; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #000; color: #fff; padding: 15px; display: flex; justify-content: space-between; border-bottom: 3px solid var(--fids); }
        .nav-main { display: flex; background: #fff; border-bottom: 1px solid #ccc; }
        .nav-btn { padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; opacity: 0.5; }
        .nav-btn.active { opacity: 1; border-bottom: 3px solid var(--accent); }
        .container { flex: 1; overflow-y: auto; padding: 20px; }
        .page { display: none; } .page.active { display: block; }
        
        /* TABLEAU MASTER */
        .card { background: #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .t-table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
        .t-row td { background: #fff; padding: 12px; border: 1px solid #cbd5e1; }
        .col-prio { width: 10px; padding: 0 !important; }
        .row-p0 td { background-color: #ffff00 !important; font-weight: bold; }
        .date-sep { background: #1e293b; color: #fff; padding: 10px; border-radius: 5px; margin: 20px 0 10px 0; font-weight: bold; }
        .drawer { display: none; padding: 10px; background: #f8fafc; border-left: 5px solid var(--accent); }
    </style>
</head>
<body>

<header>
    <div>CENSECO 2026 - <b>OPS V10.8</b></div>
    <div id="clock">00:00:00</div>
</header>

<div class="nav-main">
    <button class="nav-btn active" onclick="showPage('ops', event)">📋 MISSIONS</button>
    <button class="nav-btn" onclick="showPage('timeline-ops', event)">🗓️ TIMELINE</button>
</div>

<div class="container">
    <div id="ops" class="page active">
        <div class="card">
            <div style="display:flex; gap:10px; align-items:center;">
                <b id="nextPdgId" style="background:#000; color:#fff; padding:5px;">PDG-XXXXX</b>
                <input type="text" id="tTitle" placeholder="Titre de la mission" style="flex:1; padding:8px;">
                <button onclick="addMission()" style="background:var(--success); color:#fff; border:none; padding:10px; font-weight:bold;">VALIDER</button>
            </div>
            <div style="margin-top:10px; display:flex; gap:10px;">
                <input type="datetime-local" id="tStart">
                <select id="tPrio"><option value="0">P0</option><option value="1">P1</option><option value="2" selected>P2</option></select>
                <div id="sectorGrid" style="font-size:0.8em;"></div>
            </div>
        </div>
        <div id="p0List"></div>
        <div id="opsList"></div>
    </div>
    <div id="timeline-ops" class="page">
        <div id="vis-ops" style="height:500px; background:#fff;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7zWuD_8yzhWARz-lSdHmDrcr7M9kHFHU",
        authDomain: "censeco-2026.firebaseapp.com",
        databaseURL: "https://censeco-2026-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "censeco-2026",
        storageBucket: "censeco-2026.firebasestorage.app",
        messagingSenderId: "1030152312862",
        appId: "1:1030152312862:web:9618132ec2bcfc7831b60f"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('missions_pdg');
    const SECTEURS = ["Med C PDG", "S1 San", "S3 San", "S4 San", "S6 San", "S7 San", "Det San CenSeco", "Off Li"];

    let db_missions = [];
    let counter_pdg = 1;
    let timelineOps;
    const itemsOps = new vis.DataSet([]);
    const groupsOps = new vis.DataSet(SECTEURS.map(s => ({ id: s, content: s })));

    window.onload = () => {
        SECTEURS.forEach(s => { document.getElementById('sectorGrid').innerHTML += `<label><input type="checkbox" name="sect" value="${s}"> ${s}</label> `; });
        
        // TEST DE CONNEXION
        dbRef.on('value', snap => {
            console.log("Données reçues de Firebase !");
            const data = snap.val();
            if(data) {
                db_missions = data.data || [];
                counter_pdg = data.counter || 1;
                renderAll();
            }
        }, err => alert("Erreur Firebase : " + err.message));

        initTimeline();
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        const n = new Date(); n.setMinutes(n.getMinutes() - n.getTimezoneOffset());
        document.getElementById('tStart').value = n.toISOString().slice(0, 16);
    };

    function addMission() {
        const title = document.getElementById('tTitle').value;
        const sects = Array.from(document.querySelectorAll('input[name="sect"]:checked')).map(cb => cb.value);
        if(!title) return alert("Mettez un titre !");

        const m = {
            id: Date.now(),
            pdgId: "PDG-"+counter_pdg.toString().padStart(5,'0'),
            title: title,
            start: document.getElementById('tStart').value,
            end: document.getElementById('tStart').value, // Simplifié pour test
            priority: document.getElementById('tPrio').value,
            sector: sects,
            status: 'active'
        };

        db_missions.push(m);
        counter_pdg++;
        dbRef.set({ data: db_missions, counter: counter_pdg });
        document.getElementById('tTitle').value = '';
    }

    function renderAll() {
        const opCont = document.getElementById('opsList');
        const p0Cont = document.getElementById('p0List');
        opCont.innerHTML = ''; p0Cont.innerHTML = ''; itemsOps.clear();

        db_missions.filter(m => m.status === 'active').forEach(m => {
            const row = `<div class="t-row" style="background:#fff; margin-bottom:5px; padding:10px; border-left:10px solid ${m.priority==0?'#000':(m.priority==1?'red':'blue')}; ${m.priority==0?'background:#ffff00':''}">
                <b>${m.pdgId}</b> - ${m.title} (${m.sector.join(', ')})
            </div>`;
            
            if(m.priority == 0) p0Cont.innerHTML += row;
            else opCont.innerHTML += row;

            m.sector.forEach(s => itemsOps.add({ group: s, start: new Date(m.start), end: new Date(m.start).getTime()+3600000, content: m.title }));
        });
        document.getElementById('nextPdgId').innerText = "PDG-"+counter_pdg.toString().padStart(5,'0');
    }

    function initTimeline() {
        timelineOps = new vis.Timeline(document.getElementById('vis-ops'), itemsOps, groupsOps, { stack: false });
    }

    function showPage(id, e) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
    }
</script>
</body>
</html>
