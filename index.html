<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>CENSECO 2026 - MASTER V29.1 (Stable)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --fids: #ffcc00; --accent: #38bdf8; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #000; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--fids); }
        .nav-main { display: flex; background: #1e293b; border-bottom: 1px solid #334155; }
        .nav-btn { flex: 1; padding: 15px; border: none; background: none; color: white; font-weight: 900; cursor: pointer; opacity: 0.5; text-transform: uppercase; }
        .nav-btn.active { opacity: 1; border-bottom: 4px solid var(--fids); color: var(--fids); }
        .container { flex: 1; overflow-y: auto; padding: 20px; }
        .page { display: none; } .page.active { display: block; }

        /* TON FORMULAIRE D'ORIGINE */
        .t-form { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        .t-row { display: flex; gap: 15px; margin-bottom: 15px; align-items: flex-end; }
        .t-col { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.7em; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        input, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; }
        
        .btn-prio { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: 800; }
        .btn-prio.active { background: var(--accent); }
        .btn-prio.p0.active { background: var(--fids); color: #000; }

        .btn-submit { background: var(--success); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%; font-size: 1em; }

        /* TES CARTES DE MISSION V29.1 */
        .m-card { background: white; color: #000; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; overflow: hidden; height: 90px; border-left: 10px solid #ccc; }
        .m-card.p0 { background: var(--fids); border-left-color: #000; }
        .m-card.p1 { border-left-color: var(--danger); }
        .m-card.p2 { border-left-color: var(--accent); }
        
        .m-time { width: 95px; text-align: center; border-right: 1px solid #ddd; padding: 5px; font-weight: 800; display: flex; flex-direction: column; justify-content: center; }
        .m-id { width: 80px; font-weight: 900; text-align: center; color: var(--accent); border-right: 1px solid #ddd; }
        .m-body { flex: 1; padding: 0 15px; }
        .m-body b { font-size: 1.1em; text-transform: uppercase; }
        
        .m-status { width: 60px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .pill { font-size: 0.6em; font-weight: 900; padding: 2px 5px; border-radius: 3px; color: white; width: 35px; text-align: center; }
        .pill.on { background: var(--success); } .pill.off { background: #94a3b8; }

        .note-drawer { display: none; background: #fffde7; color: #000; padding: 15px; border: 1px solid #ddd; border-top: none; border-radius: 0 0 10px 10px; margin-top: -10px; margin-bottom: 15px; font-style: italic; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900;">CENSECO 2026 | <span style="color:var(--fids)">MASTER V29.1</span></div>
    <div id="clock" style="font-family: monospace; font-size: 1.5em; font-weight: 900;">00:00:00</div>
</header>

<nav class="nav-main">
    <button class="nav-btn active" onclick="showP('ops', event)">🚀 SAISIE</button>
    <button class="nav-btn" onclick="showP('log', event)">📂 LOG</button>
    <button class="nav-btn" onclick="showP('stats', event)">📊 STATS</button>
    <button class="nav-btn" onclick="window.open('view.html', '_blank')" style="color:var(--accent)">🖥️ MONITOR</button>
</nav>

<div class="container">
    <div id="ops" class="page active">
        <div class="t-form">
            <div class="t-row">
                <div class="t-col">
                    <label>Priorité</label>
                    <div style="display:flex; gap:5px;">
                        <button class="btn-prio p0" onclick="setP('p0', this)">P0</button>
                        <button class="btn-prio" onclick="setP('p1', this)">P1</button>
                        <button class="btn-prio active" onclick="setP('p2', this)">P2</button>
                    </div>
                </div>
                <div class="t-col"><label>Heure Début</label><input type="datetime-local" id="fStart"></div>
                <div class="t-col"><label>Fin Estimée</label><input type="datetime-local" id="fEnd"></div>
                <div class="t-col" style="margin-left:auto;"><div id="nextID" style="font-size:1.8em; font-weight:900; color:var(--fids)">PDG-?</div></div>
            </div>
            <div class="t-row">
                <div class="t-col" style="flex:2;"><label>Mission / Lieu</label>
                    <div style="display:flex; gap:10px;"><input type="text" id="fTitle" style="flex:2" placeholder="Désignation"><input type="text" id="fLoc" style="flex:1" placeholder="Lieu"></div>
                </div>
                <div class="t-col" style="flex:1;"><label>Responsable</label>
                    <select id="fResp"><option>Chef Secours</option><option>Méd C PDG</option><option>Kohlprath</option><option>Arlettaz</option></select>
                </div>
            </div>
            <div class="t-row">
                <div class="t-col" style="flex:1;"><label>Secteurs</label><input type="text" id="fSects" placeholder="Ex: S1, S2"></div>
                <div class="t-col" style="flex:1;"><label>Notes</label><input type="text" id="fNote"></div>
                <div class="t-col"><label>Protocoles</label>
                    <div style="display:flex; gap:10px; margin-top:5px;">
                        <label><input type="checkbox" id="fGcs"> GCS</label><label><input type="checkbox" id="fCpf"> CPF</label>
                    </div>
                </div>
                <button class="btn-submit" onclick="addM()">VALIDER MISSION</button>
            </div>
        </div>
        <div id="listOps"></div>
    </div>

    <div id="log" class="page"><div id="listLog"></div></div>
    <div id="stats" class="page"><h2 style="text-align:center; color:#fff">Statistiques Opérationnelles</h2><div id="statDash"></div></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyA7zWuD_8yzhWARz-lSdHmDrcr7M9kHFHU", authDomain: "censeco-2026.firebaseapp.com", databaseURL: "https://censeco-2026-default-rtdb.europe-west1.firebasedatabase.app", projectId: "censeco-2026", storageBucket: "censeco-2026.firebasestorage.app", messagingSenderId: "1030152312862", appId: "1:1030152312862:web:9618132ec2bcfc7831b60f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('missions_pdg');

    let missions = []; let count = 1; let curP = 'p2';

    db.on('value', snap => {
        const d = snap.val();
        missions = d && d.data ? d.data : [];
        count = d && d.counter ? d.counter : 1;
        draw();
    });

    function setP(v, b) { curP = v; document.querySelectorAll('.btn-prio').forEach(x=>x.classList.remove('active')); b.classList.add('active'); }

    function draw() {
        const render = (id, stat) => {
            const c = document.getElementById(id); c.innerHTML = '';
            missions.filter(m => m.status === stat).sort((a,b)=>new Date(a.start)-new Date(b.start)).forEach(m => {
                const hS = m.start ? new Date(m.start).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '--:--';
                const hE = m.end ? new Date(m.end).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
                c.innerHTML += `
                <div class="m-card ${m.priority}">
                    <div class="m-time"><b>${hS}</b>${hE?'<br><small style="color:red">FIN:'+hE+'</small>':''}</div>
                    <div class="m-id">${m.pdgId}</div>
                    <div class="m-body"><b>${m.title}</b><br><small>📍 ${m.loc} | Secteurs: ${m.sectors}</small></div>
                    <div class="m-status"><div class="pill ${m.gcs?'on':'off'}">GCS</div><div class="pill ${m.cpf?'on':'off'}">CPF</div></div>
                    <div style="padding:10px; display:flex; gap:5px;">
                        <button class="btn-prio" onclick="tglN('n-${m.id}')">👁️</button>
                        ${stat==='active'?`<button class="btn-prio" style="background:var(--danger)" onclick="finM(${m.id})">FIN</button>`:''}
                    </div>
                </div>
                <div id="n-${m.id}" class="note-drawer">Note: ${m.note || '-'} | Resp: ${m.resp}</div>`;
            });
        };
        render('listOps', 'active'); render('listLog', 'archived');
        document.getElementById('nextID').innerText = "PDG-"+count;
    }

    function addM() {
        const m = { id: Date.now(), pdgId: "PDG-"+count, title: document.getElementById('fTitle').value, loc: document.getElementById('fLoc').value, start: document.getElementById('fStart').value, end: document.getElementById('fEnd').value, priority: curP, resp: document.getElementById('fResp').value, sectors: document.getElementById('fSects').value, note: document.getElementById('fNote').value, gcs: document.getElementById('fGcs').checked, cpf: document.getElementById('fCpf').checked, status: 'active' };
        missions.push(m); count++;
        db.set({ data: missions, counter: count }).then(() => { document.getElementById('fTitle').value=''; document.getElementById('fLoc').value=''; setT(); });
    }

    function finM(id) { if(confirm("Fin ?")) { const i=missions.findIndex(x=>x.id==id); missions[i].status='archived'; db.set({data:missions, counter:count}); } }
    function tglN(id) { const e=document.getElementById(id); e.style.display=(e.style.display==='block')?'none':'block'; }
    function showP(id, e) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); e.target.classList.add('active'); }
    function setT() { let n=new Date(); n.setMinutes(n.getMinutes()-n.getTimezoneOffset()); document.getElementById('fStart').value=n.toISOString().slice(0,16); }
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    setT();
</script>
</body>
</html>
