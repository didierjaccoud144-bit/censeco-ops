<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>CENSECO 2026 - MASTER V29.3</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --fids: #ffcc00; --accent: #38bdf8; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #000; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--fids); }
        .nav-main { display: flex; background: #1e293b; border-bottom: 1px solid #334155; }
        .nav-btn { flex: 1; padding: 15px; border: none; background: none; color: white; font-weight: 900; cursor: pointer; opacity: 0.5; text-transform: uppercase; }
        .nav-btn.active { opacity: 1; border-bottom: 4px solid var(--fids); color: var(--fids); }

        .container { flex: 1; overflow-y: auto; padding: 20px; }
        .page { display: none; } .page.active { display: block; }

        /* FORMULAIRE TACTIQUE */
        .t-form { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        .t-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .t-col { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.7em; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        
        input, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 6px; font-weight: 600; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; }
        .btn-opt { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8em; font-weight: 700; }
        .btn-opt.active { background: var(--accent); border-color: var(--accent); }
        .btn-opt.p0.active { background: var(--fids); color: black; }

        .btn-submit { background: var(--success); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px; font-size: 1em; }

        /* LISTE DES MISSIONS */
        .m-card { background: white; color: #000; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; overflow: hidden; height: 90px; border-left: 8px solid #ccc; }
        .m-card.p0 { background: var(--fids); border-left-color: #000; }
        .m-card.p1 { border-left-color: var(--danger); }
        .m-card.p2 { border-left-color: var(--accent); }
        
        .m-time { width: 90px; text-align: center; border-right: 1px solid #ddd; padding: 10px; line-height: 1.2; }
        .m-id { width: 80px; font-weight: 900; text-align: center; color: var(--accent); border-right: 1px solid #ddd; }
        .m-body { flex: 1; padding: 0 15px; }
        .m-body b { font-size: 1.2em; text-transform: uppercase; }
        .m-status { width: 70px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .pill { font-size: 0.6em; font-weight: 900; padding: 2px 6px; border-radius: 4px; color: white; width: 40px; text-align: center; }
        .pill.on { background: var(--success); } .pill.off { background: var(--danger); }

        .note-area { display: none; background: #fffde7; color: #000; padding: 15px; border-radius: 0 0 10px 10px; margin-top: -15px; margin-bottom: 15px; border: 1px solid #ddd; font-style: italic; }

        /* STATS */
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .stat-box { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .stat-val { font-size: 3em; font-weight: 900; color: var(--fids); }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; font-size: 1.2em;">CENSECO 2026 <span style="color:var(--fids)">| MASTER V29.3</span></div>
    <div id="clock" style="font-family: monospace; font-size: 1.5em; font-weight: 900;">00:00:00</div>
</header>

<nav class="nav-main">
    <button class="nav-btn active" onclick="showP('ops', event)">🚀 Missions</button>
    <button class="nav-btn" onclick="showP('log', event)">📂 Archives</button>
    <button class="nav-btn" onclick="showP('stats', event)">📊 Stats</button>
    <button class="nav-btn" onclick="window.open('view.html', '_blank')" style="color:var(--accent)">🖥️ Monitor</button>
</nav>

<div class="container">
    <div id="ops" class="page active">
        <div class="t-form">
            <div class="t-grid">
                <div class="t-col">
                    <label>Priorité</label>
                    <div class="btn-group">
                        <button class="btn-opt p-btn p0" onclick="setPrio('p0', this)">P0</button>
                        <button class="btn-opt p-btn" onclick="setPrio('p1', this)">P1</button>
                        <button class="btn-opt p-btn active" onclick="setPrio('p2', this)">P2</button>
                    </div>
                </div>
                <div class="t-col"><label>Début</label><input type="datetime-local" id="fStart"></div>
                <div class="t-col"><label>Fin Estimée</label><input type="datetime-local" id="fEnd"></div>
                <div class="t-col"><label>ID Suivant</label><div id="nextID" style="font-size:1.5em; font-weight:900; color:var(--fids)">PDG-?</div></div>
            </div>
            <div class="t-grid">
                <div class="t-col" style="grid-column: span 2;"><label>Mission & Lieu</label>
                    <div style="display:flex; gap:10px;"><input type="text" id="fTitle" style="flex:2" placeholder="Quoi ?"><input type="text" id="fLoc" style="flex:1" placeholder="Où ?"></div>
                </div>
                <div class="t-col"><label>Responsable</label>
                    <select id="fResp">
                        <option>Chef Secours</option><option>Méd C PDG</option><option>Kohlprath</option><option>Arlettaz</option><option>Chablais</option><option>Logistique</option>
                    </select>
                </div>
            </div>
            <div class="t-grid">
                <div class="t-col"><label>Secteurs</label><input type="text" id="fSects" placeholder="S1, S2..."></div>
                <div class="t-col"><label>Notes Tactiques</label><input type="text" id="fNote" placeholder="Détails importants..."></div>
                <div class="t-col"><label>Checklist</label>
                    <div style="display:flex; gap:15px; margin-top:10px;">
                        <label><input type="checkbox" id="fGcs"> GCS</label>
                        <label><input type="checkbox" id="fCpf"> CPF</label>
                    </div>
                </div>
            </div>
            <button class="btn-submit" onclick="sendMission()">VALIDER LA MISSION</button>
        </div>
        <div id="listOps"></div>
    </div>

    <div id="log" class="page"><div id="listLog"></div></div>
    
    <div id="stats" class="page">
        <div class="stats-container" id="statDash"></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyA7zWuD_8yzhWARz-lSdHmDrcr7M9kHFHU", authDomain: "censeco-2026.firebaseapp.com", databaseURL: "https://censeco-2026-default-rtdb.europe-west1.firebasedatabase.app", projectId: "censeco-2026", storageBucket: "censeco-2026.firebasestorage.app", messagingSenderId: "1030152312862", appId: "1:1030152312862:web:9618132ec2bcfc7831b60f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('missions_pdg');

    let allMissions = []; let counter = 1; let curPrio = 'p2';

    db.on('value', snap => {
        const data = snap.val();
        allMissions = data && data.data ? data.data : [];
        counter = data && data.counter ? data.counter : 1;
        refreshUI();
    });

    function setPrio(v, btn) {
        curPrio = v;
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function refreshUI() {
        renderList('listOps', 'active');
        renderList('listLog', 'archived');
        document.getElementById('nextID').innerText = "PDG-" + counter;
        updateStats();
    }

    function renderList(divId, status) {
        const cont = document.getElementById(divId);
        cont.innerHTML = '';
        allMissions.filter(m => m.status === status).sort((a,b)=>new Date(a.start)-new Date(b.start)).forEach(m => {
            const hS = m.start ? new Date(m.start).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '--:--';
            const hE = m.end ? new Date(m.end).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
            
            cont.innerHTML += `
                <div class="m-card ${m.priority}">
                    <div class="m-time"><b>${hS}</b><br><small style="color:red">${hE?'Fin:'+hE:''}</small></div>
                    <div class="m-id">${m.pdgId}</div>
                    <div class="m-body"><b>${m.title}</b><br><small>📍 ${m.loc} | Secteurs: ${m.sectors}</small></div>
                    <div class="m-status">
                        <div class="pill ${m.gcs?'on':'off'}">GCS</div>
                        <div class="pill ${m.cpf?'on':'off'}">CPF</div>
                    </div>
                    <div style="padding:10px; display:flex; gap:5px;">
                        <button class="btn-opt" onclick="toggleN('n-${m.id}')">👁️</button>
                        ${status==='active' ? `<button class="btn-opt" style="background:var(--danger)" onclick="endM(${m.id})">FIN</button>`:''}
                    </div>
                </div>
                <div id="n-${m.id}" class="note-area">Note: ${m.note || 'Rien'} | Resp: ${m.resp}</div>
            `;
        });
    }

    function sendMission() {
        const m = { id: Date.now(), pdgId: "PDG-"+counter, title: document.getElementById('fTitle').value, loc: document.getElementById('fLoc').value, start: document.getElementById('fStart').value, end: document.getElementById('fEnd').value, priority: curPrio, resp: document.getElementById('fResp').value, sectors: document.getElementById('fSects').value, note: document.getElementById('fNote').value, gcs: document.getElementById('fGcs').checked, cpf: document.getElementById('fCpf').checked, status: 'active' };
        allMissions.push(m); counter++;
        db.set({ data: allMissions, counter: counter }).then(() => {
            document.getElementById('fTitle').value=''; document.getElementById('fLoc').value=''; setTime();
        });
    }

    function endM(id) { if(confirm("Clôturer ?")) { const i = allMissions.findIndex(x=>x.id==id); allMissions[i].status = 'archived'; db.set({data:allMissions, counter:counter}); } }
    function toggleN(id) { const e = document.getElementById(id); e.style.display = (e.style.display==='block')?'none':'block'; }
    function showP(id, e) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); e.target.classList.add('active'); }
    function setTime() { let n=new Date(); n.setMinutes(n.getMinutes()-n.getTimezoneOffset()); document.getElementById('fStart').value=n.toISOString().slice(0,16); }
    function updateStats() {
        const t = allMissions.length;
        const act = allMissions.filter(x=>x.status==='active').length;
        const p0 = allMissions.filter(x=>x.priority==='p0').length;
        document.getElementById('statDash').innerHTML = `<div class="stat-box">Total<div class="stat-val">${t}</div></div><div class="stat-box">Actives<div class="stat-val" style="color:var(--success)">${act}</div></div><div class="stat-box">P0 Urgentes<div class="stat-val" style="color:var(--danger)">${p0}</div></div>`;
    }
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    setTime();
</script>
</body>
</html>
